    - any-glob-to-any-file:
      - '.github/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'README.adoc'
      - 'CONTRIBUTORS'
      - 'NOTICE'
      - 'LICENSE'
      - 'LICENSE_HEADER'
      - 'examples/**'
