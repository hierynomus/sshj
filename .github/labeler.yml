dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'build.gradle'
      - 'build-publishing.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'mise.toml'
      - 'gradlew'
      - 'gradlew.bat'

infrastructure:
